<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Message for Khadidja ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  /* ===== Base ===== */
  :root{
    --pink:#ff66cc;
    --pink-2:#ff79d9;
    --hot:#ff0066;
    --hot-2:#ff3399;
    --text:#ffffff;
    --bg:#000000;
  }

  html,body{height:100%}
  body{
    margin:0;
    font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    color:var(--text);
    text-align:center;
    overflow:hidden;
    background:var(--bg);
  }

  /* ===== Galaxy Background ===== */
  body::before{
    content:"";
    position:fixed;
    inset:-50% -50%;
    background:
      radial-gradient(white, transparent 2px),
      radial-gradient(white, transparent 1px);
    background-size:100px 100px, 50px 50px;
    animation:stars 120s linear infinite;
    opacity:0.6;
    z-index:-1;
  }
  @keyframes stars{
    from{transform:translate(0,0)}
    to{transform:translate(-1000px, -500px)}
  }

  /* ===== Container ===== */
  .container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
    animation:fadeIn 1.2s ease;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(14px)}
    to{opacity:1; transform:translateY(0)}
  }

  /* ===== Titles ===== */
  h1{
    font-size:50px;
    color:var(--pink);
    text-shadow:0 0 25px var(--pink);
    margin:0 0 12px 0;
  }

  /* ===== Typewriter Paragraph ===== */
  #text{
    font-size:26px;
    max-width:760px;
    line-height:1.7;
    min-height:150px;
    padding:0 20px;
  }

  /* ===== Buttons ===== */
  .btn{
    padding:14px 32px;
    border:none;
    border-radius:35px;
    font-size:22px;
    color:#fff;
    cursor:pointer;
    margin-top:22px;
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    box-shadow:0 0 15px var(--hot-2);
    background:linear-gradient(45deg, var(--hot-2), var(--hot));
  }
  .btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 24px var(--hot);
    filter:brightness(1.05);
  }

  /* Secondary / subtle button */
  .btn-ghost{
    padding:14px 32px;
    border-radius:35px;
    font-size:22px;
    cursor:pointer;
    margin-top:22px;
    margin-left:16px;
    color:#e6e6e6;
    background:#2b2b2b;
    border:2px solid #888;
    transition:transform .2s ease, filter .2s ease, border-color .2s ease;
  }
  .btn-ghost:hover{
    transform:scale(1.05);
    filter:brightness(1.05);
    border-color:#bbb;
  }

  /* ===== Floating Hearts ===== */
  .heart{
    position:fixed;
    color:#ff4da6;
    bottom:-20px;
    animation:float 6.5s linear forwards;
    pointer-events:none;
    text-shadow:0 0 15px #ff4da6;
    z-index:10;
  }
  @keyframes float{
    from{transform:translateY(0); opacity:1;}
    to{transform:translateY(-100vh); opacity:0;}
  }

  /* ===== Confetti ===== */
  .confetti{
    position:fixed;
    top:-12px;
    width:10px;
    height:10px;
    animation:fall 4.2s linear forwards;
    z-index:9;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(720deg); }
  }

  /* ===== Utility ===== */
  .lead{
    font-size:26px;
    max-width:760px;
    line-height:1.7;
  }

  /* Responsive tuning */
  @media (max-width: 480px){
    h1{font-size:40px}
    #text, .lead{font-size:22px}
    .btn, .btn-ghost{font-size:20px; padding:12px 26px}
  }
</style>
</head>

<body>

  <div class="container" id="stage">
    <h1>For Khadidja ❤️</h1>
    <p id="text"></p>
    <button id="nextBtn" class="btn">Continue</button>
  </div>

<script>
  /* ===========================
     Messages & Typing Effect
     =========================== */
  const messages = [
    "Hi Khadidja... I made this just for you.",
    "One year ago, I met someone very special.",
    "Someone who slowly became my favorite notification.",
    "The person who makes my day brighter without even trying.",
    "And after all this time, there is something I want to tell you..."
  ];

  let i = 0, j = 0;
  const textEl = document.getElementById("text");
  const btnNext = document.getElementById("nextBtn");

  function type(){
    const current = messages[i];
    textEl.innerHTML = current.substring(0, j);
    if(j < current.length){
      j++;
      setTimeout(type, 35);  // typing speed
    }
  }
  type();

  btnNext.onclick = () => {
    i++;
    if(i < messages.length){
      j = 0;
      type();
    } else {
      showProposal();
    }
  };

  /* ===========================
     Proposal Screen (YES / NO)
     =========================== */
  function showProposal(){
    const stage = document.getElementById('stage');
    stage.innerHTML = `
      <h1 style="font-size:55px; color:var(--pink-2); text-shadow:0 0 25px var(--pink-2);">
        Khadidja
      </h1>

      <p class="lead" style="margin:8px 0 0;">
        From the moment I got to know you,<br>
        something in my life changed.
      </p>

      <p class="lead" style="margin:16px 0 0;">
        You became someone very important to me.<br>
        Someone I think about.<br>
        Someone who makes me smile without even trying.
      </p>

      <p class="lead" style="margin:18px 0 0;">
        So today... I want to ask you something special.
      </p>

      <h1 style="margin-top:26px; font-size:48px;">
        Will you be my girlfriend? 💍
      </h1>

      <div style="margin-top:28px; display:flex; flex-wrap:wrap; justify-content:center;">
        <button class="btn" onclick="sayYes()">YES ❤️</button>
        <button class="btn-ghost" onclick="sayNo()">NO 💔</button>
      </div>
    `;
  }

  /* ===========================
     YES Flow (celebration)
     =========================== */
  function sayYes(){
    document.body.innerHTML = `
      <div class="container">
        <h1 style="font-size:60px; color:var(--pink);">She Said YES ❤️</h1>
        <p class="lead" style="font-size:28px;">You just made Hichem the happiest man alive.</p>
      </div>
    `;
    hearts();
    confetti();
  }

  /* ===========================
     NO Flow (gentle message)
     =========================== */
  function sayNo(){
    document.body.innerHTML = `
      <div class="container">
        <h1 style="font-size:50px; color:#ff4d88;">It's okay ❤️</h1>
        <p class="lead">
          No matter what you choose,<br>
          Hichem is grateful for every moment shared with you.<br><br>
          Wishing you happiness, always. 🌙
        </p>
      </div>
    `;
  }

  /* ===========================
     Effects: Hearts + Confetti
     =========================== */
  function hearts(){
    const interval = setInterval(()=>{
      const heart = document.createElement("div");
      heart.textContent = "❤";
      heart.className = "heart";
      heart.style.left = Math.random()*100 + "%";
      heart.style.fontSize = (24 + Math.random()*36) + "px";
      heart.style.animationDuration = (4 + Math.random()*3) + "s";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(), 7000);
    }, 160);

    // stop after 8 seconds to avoid infinite spawning
    setTimeout(()=>clearInterval(interval), 8000);
  }

  function confetti(){
    const COUNT = 220;
    for(let k=0; k<COUNT; k++){
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random()*100 + "%";
      c.style.background = `hsl(${Math.random()*360},100%,60%)`;
      c.style.width = c.style.height = (6 + Math.random()*8) + "px";
      c.style.animationDelay = (Math.random()*2) + "s";
      document.body.appendChild(c);
      // clean up after animation
      setTimeout(()=>c.remove(), 5000);
    }
  }
</script>

</body>
</html>
